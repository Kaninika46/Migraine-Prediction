{% extends "base.html" %}
{% block title %}Register — MigraineAI{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="auth-sub">Start tracking your migraine risk today</p>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="e.g. Kaninika Giri" required/></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="you@example.com" required/></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Min 6 characters" required minlength="6"/></div>
      <div class="form-row">
        <div class="form-group"><label>Age</label><input type="number" name="age" placeholder="25" min="10" max="90"/></div>
        <div class="form-group"><label>Gender</label>
          <select name="gender">
            <option value="">Prefer not to say</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn-primary full">Create Account →</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</section>
{% endblock %}
