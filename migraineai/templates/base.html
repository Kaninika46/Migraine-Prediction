<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}MigraineAI{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
{% block head %}{% endblock %}
</head>
<body>
<div class="bg-glow"></div>
<nav>
  <a href="{{ url_for('index') }}" class="nav-logo">MigraineAI</a>
  <ul class="nav-links">
    {% if session.user_id %}
      <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
      <li><a href="{{ url_for('assess') }}">Assess</a></li>
      <li><a href="{{ url_for('log_page') }}">Diary</a></li>
      <li><a href="{{ url_for('logout') }}" class="nav-logout">Logout</a></li>
    {% else %}
      <li><a href="{{ url_for('login') }}">Login</a></li>
      <li><a href="{{ url_for('register') }}" class="nav-cta">Get Started →</a></li>
    {% endif %}
  </ul>
</nav>
<main>{% block content %}{% endblock %}</main>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
