{% extends "base.html" %}
{% block title %}Login — MigraineAI{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="auth-sub">Login to view your risk history and trends</p>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="you@example.com" required/></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required/></div>
      <button type="submit" class="btn-primary full">Login →</button>
    </form>
    <p class="auth-link">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
  </div>
</section>
{% endblock %}
